name: Deploy to Cloud Run

on:
  push:
    branches: [ "main" ]

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: google-github-actions/auth@v2
      with:
        workload_identity_provider: projects/255290345904/locations/global/workloadIdentityPools/github-pool/providers/github-provider
        service_account: github-deployer@lottery-result-checker.iam.gserviceaccount.com

    - uses: google-github-actions/setup-gcloud@v2

    - run: |
        gcloud run deploy kerala-lottery-scrapper \
          --source . \
          --region asia-south1 \
          --platform managed \
          --allow-unauthenticated