name: Deploy to Cloud Run

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/255290345904/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-deployer@lottery-result-checker.iam.gserviceaccount.com

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy kerala-lottery-scrapper \
            --source . \
            --region asia-south1 \
            --platform managed \
            --allow-unauthenticated