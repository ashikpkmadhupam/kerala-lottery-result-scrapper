name: run_lottery_scrapper

on:
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    environment: prod
    env:
      FIREBASE_KEY: ${{ secrets.FIREBASE_KEY }}
    steps:
      - name: Test connectivity
        run: curl -I https://statelottery.kerala.gov.in/index.php/lottery-result-view -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/120.0.0.0 Safari/537.36" -H "Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/webp,*/*;q=0.8" -H "Accept-Language: en-US,en;q=0.9" -H "Accept-Encoding: gzip, deflate, br" -H "Connection: keep-alive" -H "Upgrade-Insecure-Requests: 1" -H "Cache-Control: max-age=0" -H "Referer: https://www.google.com/"
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Debug env
        run: |
            echo "FIREBASE_KEY length:"
            echo ${#FIREBASE_KEY}
        env:
            FIREBASE_KEY: ${{ secrets.FIREBASE_KEY }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run lottery scraper
        run: |
          python src/main.py
